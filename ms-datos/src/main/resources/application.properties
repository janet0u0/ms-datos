spring.application.name=ms-datos
server.port=8083

# =============================================
# Configuracion MySQL con Docker
# Ejecutar primero: docker-compose up -d
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3308/ms_datos_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =============================================
# Actuator
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always